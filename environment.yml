name: cfgs
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=12.1
  - pip:
      - numpy<2
      - tqdm
      - plyfile
      - matplotlib
      - scikit-image
      - pyyaml
      - pandas
      - setuptools
      - wheel
